<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Speech Synchronization Test (SSS-Test)</title>
</head>
<body>
    
    <h1>Speech to Speech Synchronization Test (SSS-Test)</h1>
    <h2>Created by Carlos Magallanes-Aranda, cmagallanx@gmail.com</h2>

    <h1>Introduction / Instructions</h1>

    <!-- Test Recording-->

    <h3>Test recording</h3>

    <button onclick="startRecording_test()" id="recordButton_Test">Start Recording Test</button>
    <p id="status_test">Idle</p>

    <audio id="playback_test" controls></audio>

    <!-- Recording Example Test scripts -->

    <script>
    let mediaRecorder;
    let audioChunks_test = [];

    async function startRecording_test() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        let recordButton_Test = document.getElementById("recordButton_Test");

        mediaRecorder = new MediaRecorder(stream);
        audioChunks_test = [];

        mediaRecorder.start();
        document.getElementById("status_test").textContent = "Recording...";

        mediaRecorder.ondataavailable = event => {
            audioChunks_test.push(event.data);
        };

        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks_test, { type: "audio/webm" });
            const audioUrl = URL.createObjectURL(audioBlob);
            document.getElementById("playback_test").src = audioUrl;
            document.getElementById("status_test").textContent = "Recording finished";
            recordButton_Test.textContent = "Retest Recording";
        };

        setTimeout(() => {
            mediaRecorder.stop();
        }, 5000); // 5 seconds
    }
    </script>

    <!-- Training Playing & Recording-->

    <h3>Training</h3>

    <button onclick="toggle_example()" id="audio_example_button">Play Example</button>

    <audio id="audio_example">
    <source src="example_ExpAcc.wav" type="audio/wav">
    </audio>

    <br><br>

    <button onclick="startRecording_training()" id="recordButton_Train">Start Recording Training</button>
    <p id="status_train">Idle</p>

    <audio id="playback_train"></audio>

    <!-- Play Example scripts -->

    <script>

        let audio_example = document.getElementById("audio_example");
        let audio_example_button = document.getElementById("audio_example_button");

        function toggle_example() {
            if (audio_example.paused) {
                audio_example.play();
                audio_example_button.textContent = "Stop Example";
            } else {
                audio_example.pause();
                audio_example.currentTime = 0;
                audio_example_button.textContent = "Play Example";
            }
        }

        audio_example.onended = function() {
            audio_example_button.textContent = "Play Example";
        };
        
    </script>

    <!-- Recording Example Training scrips -->

    <script>

        let audioChunks_train = [];

        async function startRecording_training() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            mediaRecorder = new MediaRecorder(stream);
            audioChunks_train = [];

            mediaRecorder.start();
            document.getElementById("status_train").textContent = "Recording...";

            mediaRecorder.ondataavailable = event => {
                audioChunks_train.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks_train, { type: "audio/webm" });
                const audioUrl = URL.createObjectURL(audioBlob);
                document.getElementById("playback_train").src = audioUrl;
                document.getElementById("status_train").textContent = "Recording finished";
                document.getElementById("recordButton_Train").textContent = "Retest Recording Training";
            };

            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000); // 30 seconds
        }

    </script>

    <!-- Main Experiment-->
    
    <h3>Experiment</h3>

    <button onclick="startExperiment()" id="recordButton_Experiment" >Start Experiment</button>
    <p id="status_experiment">Idle</p>

    <audio id="playback_experiment"></audio>

    <audio id="audio_stimulus">
    <source src="stimulus_ExpAcc_short.wav" type="audio/wav">
    </audio>

    <h3>Experiment Results</h3>

    <p id="output_experiment"> Results </p>

    <!-- Main Experiment scrips -->

    <script>

        let audioContext;
        let processor;  
        let input;
        let stream;
        let chunks = [];

        async function startExperiment() {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            audioContext = new AudioContext();
            input = audioContext.createMediaStreamSource(stream);

            processor = audioContext.createScriptProcessor(4096, 1, 1);

            chunks = [];

            processor.onaudioprocess = function(e) {
                const data = e.inputBuffer.getChannelData(0);
                chunks.push(new Float32Array(data));
            };

            input.connect(processor);
            processor.connect(audioContext.destination);

            document.getElementById("status_experiment").textContent = "Recording...";

            document.getElementById("audio_stimulus").play();

            setTimeout(() => {
                stopExperiment();
            }, 9000);
        }

        function stopExperiment() {
            processor.disconnect();
            input.disconnect();

            stream.getTracks().forEach(track => track.stop());

            const samples = mergeBuffers(chunks);
            const wavBlob = encodeWAV(samples, audioContext.sampleRate);

            const url = URL.createObjectURL(wavBlob);

            let playback = document.createElement("audio");
            playback.controls = false;
            playback.src = url;
            document.body.appendChild(playback);

            document.getElementById("status_experiment").textContent = "Recording finished";
            document.getElementById("recordButton_Experiment").textContent = "Retest Experiment";

            sendAudio(wavBlob);
        }

        function mergeBuffers(chunks) {
            let length = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
            let result = new Float32Array(length);

            let offset = 0;
            for (let chunk of chunks) {
                result.set(chunk, offset);
                offset += chunk.length;
            }

            return result;
        }

        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            function writeString(view, offset, string) {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            }

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, 'WAVE');

            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);

            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 2, true);

            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        async function sendAudio(blob) {
            let formData = new FormData();
            formData.append("audio", blob, "recording.wav");

            const response = await fetch('https://sss-test-l09c.onrender.com/test', {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            document.getElementById("output_experiment").textContent = result;
        }
   
   </script>

</body>
</html>
