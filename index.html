<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Speech Synchronization Test (SSS-Test)</title>
</head>
<body>
    
    <h1>Speech to Speech Synchronization Test (SSS-Test)</h1>
    <h2>Created by Carlos Magallanes-Aranda</h2>
    <h2>cmagallanx@gmail.com</h2>

    <button onclick="toggleAudio()" id="audioButton">Play Audio</button>
    
    <audio id="example">
        <source src="example_ExpAcc.wav" type="audio/mpeg">
    </audio>

    <script>
        let audio = document.getElementById("example");
        let button = document.getElementById("audioButton");

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                button.textContent = "Stop Audio";
            } else {
                audio.pause();
                audio.currentTime = 0; // reset to start
                button.textContent = "Play Audio";
            }
        }

        audio.onended = function() {
            button.textContent = "Play Audio";
        };
    </script>



    
</body>
</html>
