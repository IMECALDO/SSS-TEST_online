<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech to Speech Synchronization Test (SSS-Test)</title>
</head>
<body>
    
    <h1>Speech to Speech Synchronization Test (SSS-Test)</h1>
    <h2>Created by Carlos Magallanes-Aranda, cmagallanx@gmail.com</h2>

    <h1>Introduction / Instructions</h1>

    <!-- Test Recording-->

    <h3>Test recording</h3>

    <button onclick="startRecording_test()" id="recordButton_Test">Start Recording Test</button>
    <p id="status_test">Idle</p>

    <audio id="playback_test" controls></audio>

    <!-- Recording Example Test scripts -->

    <script>
    let mediaRecorder;
    let audioChunks_test = [];

    async function startRecording_test() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        let recordButton_Test = document.getElementById("recordButton_Test");

        mediaRecorder = new MediaRecorder(stream);
        audioChunks_test = [];

        mediaRecorder.start();
        document.getElementById("status_test").textContent = "Recording...";

        mediaRecorder.ondataavailable = event => {
            audioChunks_test.push(event.data);
        };

        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks_test, { type: "audio/webm" });
            const audioUrl = URL.createObjectURL(audioBlob);
            document.getElementById("playback_test").src = audioUrl;
            document.getElementById("status_test").textContent = "Recording finished";
            recordButton_Test.textContent = "Retest Recording";
        };

        setTimeout(() => {
            mediaRecorder.stop();
        }, 5000); // 5 seconds
    }
    </script>

    <!-- Training Playing & Recording-->

    <h3>Training</h3>

    <button onclick="toggle_example()" id="audio_example_button">Play Example</button>

    <audio>
    <source src="example_ExpAcc.wav" type="audio/wav">
    </audio>

    <br><br>

    <button onclick="startRecording_training()" id="recordButton_Train">Start Recording Training</button>
    <p id="status_train">Idle</p>

    <audio id="playback_train"></audio>

    <!-- Play Example scripts -->

    <script>

        let audio_example = document.getElementById("audio_example");
        let audio_example_button = document.getElementById("audio_example_button");

        function toggle_example() {
            if (audio_example.paused) {
                audio_example.play();
                audio_example_button.textContent = "Stop Example";
            } else {
                audio_example.pause();
                audio_example.currentTime = 0;
                audio_example_button.textContent = "Play Example";
            }
        }

        audio_example.onended = function() {
            audio_example_button.textContent = "Play Example";
        };
        
    </script>

    <!-- Recording Example Training scrips -->

    <script>

        let audioChunks_train = [];

        async function startRecording_training() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            mediaRecorder = new MediaRecorder(stream);
            audioChunks_train = [];

            mediaRecorder.start();
            document.getElementById("status_train").textContent = "Recording...";

            mediaRecorder.ondataavailable = event => {
                audioChunks_train.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks_train, { type: "audio/webm" });
                const audioUrl = URL.createObjectURL(audioBlob);
                document.getElementById("playback_train").src = audioUrl;
                document.getElementById("status_train").textContent = "Recording finished";
                document.getElementById("recordButton_Train").textContent = "Retest Recording Training";
            };

            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000); // 30 seconds
        }

    </script>

</body>
</html>
